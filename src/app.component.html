<joys-overlay-loading [show]="globalLoading" [message]="'common.loading' | translate"></joys-overlay-loading>

<!-- TOP OF THE TOP: Floating Refresh Indicator -->
<div class="fixed inset-x-0 top-0 flex items-center justify-center pointer-events-none z-[10000]"
     style="padding-top: env(safe-area-inset-top, 0px);">
  <div *ngIf="showPullRefreshIndicator"
       class="mt-4 flex h-11 w-11 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-xl border border-slate-100 dark:border-slate-700 transition-all duration-150"
       [style.opacity]="pullRefreshOpacity"
       [style.transform]="'translateY(' + (pullDistance - 10) + 'px) rotate(' + (pullDistance * 4) + 'deg) scale(' + (pullDistance >= pullTriggerDistance ? 1.1 : 1) + ')'"
       [class.border-emerald-500]="pullDistance >= pullTriggerDistance && !isPullRefreshing"
       [class.text-emerald-500]="pullDistance >= pullTriggerDistance && !isPullRefreshing"
       [class.text-primary]="pullDistance < pullTriggerDistance || isPullRefreshing">
    <span class="material-symbols-outlined text-[24px]" [class.animate-spin]="isPullRefreshing">
      {{ isPullRefreshing ? 'progress_activity' : (pullDistance >= pullTriggerDistance ? 'check_circle' : 'refresh') }}
    </span>
  </div>
</div>



<div class="relative flex h-[100dvh] w-screen overflow-hidden bg-slate-50 dark:bg-background-dark">
  <div class="hidden lg:block">
    <joys-sidebar [collapsed]="sidebarCollapsed" [activeView]="currentRouteView" [externalOverlay]="sidebarOverlay"
      (externalOverlayChange)="sidebarOverlay = $event" (collapseToggle)="sidebarCollapsed = $event"
      (navigationClicked)="onNavigationChanged($event)"></joys-sidebar>
  </div>
  <div class="flex min-h-0 flex-1 flex-col transition-transform duration-300"
       [class.duration-0]="isPulling"
       [style.transform]="mainContainerTransform">
    <div class="hidden lg:block">
      <joys-header (createGroupClicked)="onCreateGroupClicked()" [sidebarCollapsed]="sidebarCollapsed"
        (toggleSidebar)="toggleSidebar()"></joys-header>
    </div>
    <div class="min-h-0 flex-1 w-full">
      <joys-main-content #mainContent (newGroupClicked)="onCreateGroupClicked($event)"
        (editGroupClicked)="onEditGroupClicked($event)"></joys-main-content>
    </div>
  </div>

  <div
    class="pointer-events-none fixed inset-x-0 bottom-0 z-50 flex justify-center px-3 pb-[calc(env(safe-area-inset-bottom))] lg:hidden">
    <div class="mobile-dock-shell liquid-dock-layout pointer-events-auto w-full max-w-4xl">
      <button *ngIf="isFriendsView()" type="button" (click)="openAddFriendFromDock()"
        class="liquid-fab liquid-dock-floating-action liquid-glass-entrance"
        [attr.aria-label]="'friends.add' | translate" [title]="'friends.add' | translate">
        <span class="material-symbols-outlined text-[22px]">person_add</span>
      </button>

      <button *ngIf="isDashboardView()" type="button" (click)="onCreateGroupClicked()"
        class="liquid-fab liquid-dock-floating-action liquid-glass-entrance"
        [attr.aria-label]="'newGroup.title' | translate" [title]="'newGroup.title' | translate">
        <span class="material-symbols-outlined text-[22px]">group_add</span>
      </button>

      <button *ngIf="isGroupDetailView()" type="button" (click)="openAddExpenseFromDock()"
        class="liquid-fab liquid-dock-floating-action liquid-glass-entrance"
        [attr.aria-label]="'groupDetail.addExpense' | translate" [title]="'groupDetail.addExpense' | translate">
        <span class="material-symbols-outlined text-[22px]">add_circle</span>
      </button>


      <!-- Liquid Glass Dock — Pure CSS frosted glass -->
      <nav class="liquid-glass-dock liquid-glass-entrance w-full"
           [attr.aria-label]="'mobileNav.activities' | translate">
        <div class="grid grid-cols-4 gap-1.5">

          <button type="button" (click)="onBottomNavigation('joys-table')" class="liquid-glass-item"
            [attr.data-active]="isBottomNavActive('joys')" [class]="getBottomNavItemClasses('joys')">
            <span class="material-symbols-outlined text-[22px] leading-none">auto_awesome</span>
            <span class="text-[10px] font-semibold leading-none">{{
              "mobileNav.joys" | translate
              }}</span>
          </button>

          <button type="button" (click)="onBottomNavigation('friends')" class="liquid-glass-item"
            [attr.data-active]="isBottomNavActive('friends')" [class]="getBottomNavItemClasses('friends')">
            <span class="material-symbols-outlined text-[22px] leading-none">group</span>
            <span class="text-[10px] font-semibold leading-none">{{
              "mobileNav.friends" | translate
              }}</span>
          </button>

          <button type="button" (click)="onBottomNavigation('activities')" class="liquid-glass-item"
            [attr.data-active]="isBottomNavActive('activities')" [class]="getBottomNavItemClasses('activities')">
            <span class="material-symbols-outlined text-[22px] leading-none">timeline</span>
            <span class="text-[10px] font-semibold leading-none">{{
              "mobileNav.activities" | translate
              }}</span>
          </button>

          <button type="button" (click)="onBottomNavigation('account')" class="liquid-glass-item"
            [attr.data-active]="isBottomNavActive('account')" [class]="getBottomNavItemClasses('account')">
            <span class="material-symbols-outlined text-[22px] leading-none">person</span>
            <span class="text-[10px] font-semibold leading-none">{{
              "mobileNav.account" | translate
              }}</span>
          </button>
        </div>
      </nav>
    </div>
  </div>
</div>

<joys-new-group-dialog #newGroupDialog (groupCreated)="onGroupCreated($event)"></joys-new-group-dialog>
<joys-common-dialog></joys-common-dialog>
