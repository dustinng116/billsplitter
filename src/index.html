<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Joys Splitter - Manage Split Expenses</title>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Apple full screen and notch support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />

    <meta property="og:image" content="assets/joys-splitter.png" />
    <meta name="referrer" content="origin-when-cross-origin" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="assets/joys-splitter.png" />

    <link rel="icon" type="image/png" href="assets/joys-splitter.png" />
    <link rel="apple-touch-icon" href="assets/joys-splitter.png" />
    <meta name="theme-color" content="#135bec" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      body {
        margin: 0;
        font-family: Inter, sans-serif;
      }

      #splash-screen {
        position: fixed;
        z-index: 9999;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6f6f8;
        transition: opacity 0.4s;
      }

      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        opacity: 0;
        transition: opacity 2s;
      }
      .splash-actions {
        opacity: 0;
        transition: opacity 0.6s;
      }
      .splash-spinner {
        margin-top: 2rem;
        width: 48px;
        height: 48px;
        border: 5px solid #e0e7ef;
        border-top: 5px solid #135bec;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 1023px) {
        .splash-actions {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 2rem;
          margin-top: 0;
          flex-direction: column;
          align-items: center;
          z-index: 10000;
        }
        .splash-content {
          min-height: 60vh;
        }
      }

      .splash-icon {
        width: 128px;
        height: 128px;
      }

      .splash-title {
        font-size: 2rem;
        font-weight: 700;
        color: #135bec;
        margin-top: 12px;
      }

      .splash-desc {
        margin-top: 4px;
        font-size: 1rem;
        color: #888;
      }

      .splash-actions {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 2rem;
        width: 100%;
        align-items: center;
      }

      #splash-google-btn {
        width: 100%;
        max-width: 260px;
      }

      #splash-skip-btn {
        background: #fff;
        color: #135bec;
        border: 1px solid #135bec;
        border-radius: 4px;
        padding: 0.4rem 2rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px #135bec22;
        width: 100%;
        max-width: 260px;
        margin-top: 0.5rem;
      }
      #splash-skip-btn:hover {
        background: #f0f6ff;
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <img
          src="assets/joys-splitter.png"
          alt="Joys Splitter"
          class="splash-icon"
        />

        <div class="splash-title">Joys Splitter</div>
        <div class="splash-desc">Manage Split Expenses</div>

        <div class="splash-spinner" id="splash-spinner"></div>
        <div class="splash-actions" id="splash-actions" style="opacity: 0">
          <div id="splash-google-btn"></div>
          <button id="splash-skip-btn" data-i18n="splash.skip">
            Skip and let's joy
          </button>
        </div>
      </div>
    </div>

    <joys-root>Loading...</joys-root>

    <script>
      function hideSplash() {
        var splash = document.getElementById("splash-screen");
        if (splash) splash.style.opacity = "0";
        setTimeout(function () {
          if (splash) splash.style.display = "none";
        }, 400);
      }

      globalThis.addEventListener("DOMContentLoaded", function () {
        var googleBtnRendered = false;
        var splashContent = document.querySelector(".splash-content");
        var splashSpinner = document.getElementById("splash-spinner");
        var splashActions = document.getElementById("splash-actions");
        var skipBtn = document.getElementById("splash-skip-btn");

        // i18n for skip button
        function translateSkip() {
          var lang = (navigator.language || "en").toLowerCase();
          var text = {
            en: "Skip and let's joy",
            vi: "Bỏ qua và vào Joy",
          };
          var btn = document.querySelector('[data-i18n="splash.skip"]');
          if (btn) btn.textContent = text[lang.startsWith("vi") ? "vi" : "en"];
        }
        translateSkip();

        // Fade in icon/app name, show spinner, then show buttons after 2s (mobile/tablet only)
        var isMobile = window.innerWidth < 1024;
        if (isMobile) {
          splashContent.style.opacity = 0;
          splashActions.style.opacity = 0;
          splashActions.style.display = "flex";
          splashSpinner.style.display = "block";
          setTimeout(function () {
            splashContent.style.opacity = 1;
          }, 10);
          setTimeout(function () {
            splashSpinner.style.display = "none";
            splashActions.style.opacity = 1;
          }, 2000);
        } else {
          splashContent.style.opacity = 1;
          splashActions.style.display = "flex";
          splashActions.style.opacity = 1;
          splashSpinner.style.display = "none";
        }

        function renderFallbackBtn() {
          if (googleBtnRendered) return;
          var btn = document.createElement("button");
          btn.textContent = "Login with Google";
          btn.style =
            "background:#fff;color:#135bec;border:1px solid #135bec;border-radius:8px;padding:0.75rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;box-shadow:0 2px 8px #135bec22;width:100%;max-width:260px;";
          btn.onclick = hideSplash;
          var container = document.getElementById("splash-google-btn");
          if (container) container.appendChild(btn);
          googleBtnRendered = true;
        }

        function initGoogle() {
          if (!window.google || !google.accounts || !google.accounts.id) {
            setTimeout(initGoogle, 120);
            return;
          }
          try {
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            google.accounts.id.initialize({
              client_id:
                "45157459483-mdurood55e9vv5dpjqda8chv62fgvjdf.apps.googleusercontent.com",
              callback: function (response) {
                hideSplash();
              },
              ux_mode: "popup",
            });
            google.accounts.id.renderButton(
              document.getElementById("splash-google-btn"),
              {
                theme: "outline",
                size: "large",
                width: 260,
              }
            );
            googleBtnRendered = true;
          } catch (e) {
            console.warn("Google login failed", e);
            renderFallbackBtn();
          }
        }

        // Try to load Google login button, fallback after 3s
        initGoogle();
        setTimeout(renderFallbackBtn, 3000);

        if (skipBtn) skipBtn.onclick = hideSplash;
      });
    </script>
  </body>
</html>
